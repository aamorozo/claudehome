name = "fub-daily-report"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 8:30am Pacific = 15:30 UTC (PDT, Mar–Nov) | 16:30 UTC (PST, Nov–Mar)
# Using PDT cron; update to '30 16 * * 1-5' in winter if needed.
[triggers]
crons = ["30 15 * * 1-5"]

[vars]
# Non-secret vars can go here. Secrets go via: wrangler secret put <NAME>

# Secrets required (set via CLI — never commit these):
#   wrangler secret put FUB_API_KEY
#   wrangler secret put SLACK_WEBHOOK_URL
