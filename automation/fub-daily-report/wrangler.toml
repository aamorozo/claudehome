name = "fub-daily-report"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Cron: Mon-Fri 8:30am Pacific
# PDT (Mar-Nov): UTC-7 → 15:30 UTC
# PST (Nov-Mar): UTC-8 → 16:30 UTC
# Using 15:30 UTC; adjust to 30 16 * * 1-5 in winter
[triggers]
crons = ["30 15 * * 1-5"]

[vars]
# FUB user IDs for name resolution in the report
# Find these in FUB Admin → Team → click a user → check the URL for ?userId=
ARRAN_USER_ID = ""
KERI_USER_ID  = ""

# Secrets — set via CLI, never commit values:
# wrangler secret put FUB_API_KEY
# wrangler secret put SLACK_WEBHOOK_URL
