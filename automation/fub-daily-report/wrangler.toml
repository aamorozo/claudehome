name = "fub-daily-report"
main = "index.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

# 8:30am PDT (UTC-7, mid-Mar through early Nov)
# Change to "30 16 * * 1-5" during PST (UTC-8, Nov–Mar)
[triggers]
crons = ["30 15 * * 1-5"]

# Set these secrets via: wrangler secret put <NAME>
# FUB_API_KEY       — your FUB API key (no colon, worker adds it)
# SLACK_WEBHOOK_URL — Incoming Webhook URL for #fub-dashboard
# AGENT_MAP         — JSON: {"<arraUserId>":"Arran","<keriUserId>":"Keri"}
