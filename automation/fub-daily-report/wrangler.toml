name = "fub-daily-report"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Cron: 8:30am Pacific Mon-Fri
# Pacific = UTC-7 (PDT summer) / UTC-8 (PST winter)
# Using UTC-7 (PDT): 8:30am PDT = 15:30 UTC
# Adjust to "30 16 * * 1-5" during PST (Nov-Mar)
[triggers]
crons = ["30 15 * * 1-5"]

# Secrets — set with: wrangler secret put FUB_API_KEY
# [vars]
# FUB_API_KEY = ""           # set via: wrangler secret put FUB_API_KEY
# SLACK_WEBHOOK_URL = ""     # set via: wrangler secret put SLACK_WEBHOOK_URL
