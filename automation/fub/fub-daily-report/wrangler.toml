name = "fub-daily-report"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cron: 8:30am PDT (UTC-7) = 15:30 UTC | During PST (UTC-8) runs at 7:30am — adjust Nov-Mar if needed
[triggers]
crons = ["30 15 * * 1-5"]

[vars]
# Set actual secrets via: wrangler secret put FUB_API_KEY
# Set actual secrets via: wrangler secret put SLACK_WEBHOOK_URL
STALE_DAYS = "5"
LOOKBACK_DAYS = "10"
